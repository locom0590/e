<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kognitif VR Labirent / Rehabilitasyon</title>
    <style>
        /* Ekran Kartı ve Dokunma Kilitleri */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            /* Dokunmatik ekran kaymalarını ve varsayılan tarayıcı hareketlerini engelleme */
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* Tam Ekran ve Kalibrasyon Butonları */
        .vr-ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            gap: 10px;
        }
        .vr-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="vr-ui-overlay">
        <button class="vr-btn" id="btn-fullscreen">Tam Ekran</button>
        <button class="vr-btn" id="btn-calibrate">Sensör Sıfırla</button>
    </div>

    <script>
        // --- KÜRESEL DEĞİŞKENLER & AYARLAR ---
        let scene, camera, renderer, effect;
        let container = document.getElementById('canvas-container');
        
        // Jiroskop ve Slerp (Jitter Engelleme) Değişkenleri
        let currentQuaternion = new THREE.Quaternion();
        let targetQuaternion = new THREE.Quaternion();
        let sensorBiasQuaternion = new THREE.Quaternion(); // Kalibrasyon için
        const SMOOTH_FACTOR = 0.15; // 0.01 (Çok yumuşak/Gecikmeli) - 1.0 (Anlık/Gürültülü)

        // --- 1. SENSOR TAKİBİ VE JITTER ENGELLEME ---
        function initSensors() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    // Alpha: Z ekseni (Pusula), Beta: X ekseni (Öne/Arkaya), Gamma: Y ekseni (Sağa/Sola)
                    if (event.alpha !== null && event.beta !== null && event.gamma !== null) {
                        
                        // Dereceleri Radyana Çevirme
                        const alpha = THREE.MathUtils.degToRad(event.alpha);
                        const beta = THREE.MathUtils.degToRad(event.beta);
                        const gamma = THREE.MathUtils.degToRad(event.gamma);

                        // Mobil tarayıcılar arası eksen uyumsuzluğunu çözen standart Euler dönüşümü (YXZ)
                        const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
                        
                        // Hedef Quaternion'u belirle
                        targetQuaternion.setFromEuler(euler);
                    }
                }, false);
            }
        }

        // --- 2. ANA KURULUM (INITIALIZATION) ---
        function init() {
            // Sahne
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111116);

            // Kamera (StereoEffect bunu ikiye bölecek, FOV ve Aspect otomatik yönetilir)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0); // Ortalama insan göz hizası boyu (1.6m)
            scene.add(camera);

            // Renderer (WebGL2 ve Güç Tasarrufu / Performans Ayarları)
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance",
                precision: "mediump" // Mobil GPU'lar için optimize edildi
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Aşırı yüksek çözünürlükte kasılmayı önler
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Stereoscopic (Çift Ekran) Efekti
            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); // Standart IPD (Gözbebekleri arası mesafe: 64mm)
            effect.setSize(window.innerWidth, window.innerHeight);

            // Işıklandırma (Performans için gölgesiz basit ışıklar)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Geçici Zemin (Şablonun çalıştığını görmek için)
            const grid = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
            grid.position.y = 0;
            scene.add(grid);

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            setupUI();
            initSensors();
        }

        // --- 3. DÖNGÜ VE ANIMASYON (RENDER LOOP) ---
        function animate() {
            requestAnimationFrame(animate);

            // Jitter Engelleme: Mevcut rotasyonu, ham sensör verisine (target) Slerp ile yumuşatarak yaklaştır
            currentQuaternion.slerp(targetQuaternion, SMOOTH_FACTOR);
            
            // Kalibrasyon ofsetini uygula ve kameraya aktar
            camera.quaternion.copy(sensorBiasQuaternion).multiply(currentQuaternion);

            // Stereoscopic Çift Ekran Render tetiklemesi
            effect.render(scene, camera);
        }

        // --- 4. YARDIMCI FONKSİYONLAR & UI ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        function setupUI() {
            // Tam Ekran Mekanizması (Adres çubuğunu gizlemek için şart)
            document.getElementById('btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Tam ekran modu hatası: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            });

            // Bakılan Yönü Sıfırlama (Kalibrasyon)
            document.getElementById('btn-calibrate').addEventListener('click', () => {
                sensorBiasQuaternion.copy(currentQuaternion).invert();
            });
        }

        // Başlat
        init();
        animate();
    </script>
</body>
</html>
