<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Elma Toplama Oyunu - Uzak ve Büyük</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #22c55e; color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.4);
        }
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 12px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h2>VR ELMA TOPLAMA OYUNU</h2>
        <p>3 Kat Uzaklıkta Ölçeklendirilmiş Mod<br>Ekran kilidi kapalı ve maksimum parlaklık aktif.</p>
        <button class="vr-start-btn" id="btn-start">OYUNU BAŞLAT</button>
    </div>

    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, effect, audioCtx, wakeLock = null;
        let container = document.getElementById('canvas-container');
        
        // --- ASLA DEĞİŞMEYECEK ÇEKİRDEK QUATERNION & SLERP MİMARİSİ ---
        let rawSensorQuaternion = new THREE.Quaternion();
        let calibratedTarget = new THREE.Quaternion();   
        let currentQuaternion = new THREE.Quaternion();  
        let sensorBiasQuaternion = new THREE.Quaternion();
        
        const SMOOTH_FACTOR = 0.12; 
        const zee = new THREE.Vector3(0, 0, 1);
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        // --- OYUN ELEMENTLERİ VE MEKANİK DEĞİŞKENLERİ ---
        let basket; 
        let apples = [];
        let feedbackSprites = [];
        let score = 0;
        let lastAppleSpawnTime = 0;
        
        const spawnInterval = 1500; 
        const appleFallSpeed = 0.04; 
        
        // Uzaklık 3 katına çıktığı için perspektif açısını korumak adına kanal genişlikleri de 3 katına çıkarıldı
        const lanes = [-9.0, -4.5, 0.0, 4.5, 9.0]; 
        const spawnHeight = 7.0; 
        const horizonHeight = 0.2; 
        
        // Nesneler uzaklaştığı için sepet 2 kat, elmalar 1.5 kat büyütüldü ve yakalama alanı genişletildi
        const catchRadius = 1.2; 
        const gameDepth = -9.0; // Eski konum 0'dı, şimdi kameradan 3 kat daha uzakta (-9.0)

        function onDeviceOrientation(event) {
            if (event.alpha === null) return;
            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            rawSensorQuaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
        }

        async function requestSensorsPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, false);
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                return true;
            }
        }

        // --- EKRANIN KAPANMASINI ENGELLEME (WAKE LOCK) ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Ekran kilidi aktif: Ekran kapanmayacak.');
                }
            } catch (err) {
                console.log(`Wake Lock Hatası: ${err.message}`);
            }
        }

        // --- WEB AUDIO API SYNTHESIZER ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(isPositive) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (isPositive) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); 
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            }
        }

        // --- 2D CANVAS ILE VEKTÖREL UI ICON GENERATOR ---
        function createFeedbackTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);

            if (type === 'success') {
                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 14;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(25, 65);
                ctx.lineTo(53, 93);
                ctx.lineTo(105, 35);
                ctx.stroke();
            } else {
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 14;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(32, 32);
                ctx.lineTo(96, 96);
                ctx.moveTo(96, 32);
                ctx.lineTo(32, 96);
                ctx.stroke();
            }

            return new THREE.CanvasTexture(canvas);
        }

        function spawnFeedback(type, xPosition) {
            const texture = createFeedbackTexture(type);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            
            // Efekt de elmalarla aynı derinlikte (-9.0) beliriyor
            sprite.position.set(xPosition, horizonHeight + 1.2, gameDepth);
            sprite.scale.set(1.2, 1.2, 1); // Uzakta olduğu için simge boyutu da büyütüldü
            
            scene.add(sprite);
            feedbackSprites.push({ mesh: sprite, lifetime: 0, maxLifetime: 45 });
        }

        // --- SAHNE KURULUMU ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f1d); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            // Kamera 4.5 noktasında duruyor, nesneler -9.0 noktasında. Aradaki net mesafe 3 katına çıkarıldı.
            camera.position.set(0, 1.6, 4.5); 
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", precision: "mediump" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); 
            effect.setSize(window.innerWidth, window.innerHeight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 15, 5);
            scene.add(dirLight);

            const grid = new THREE.GridHelper(60, 60, 0x334155, 0x1e293b);
            grid.position.y = 0;
            scene.add(grid);

            // SEPET OLUŞTURMA (Ölçüleri tam 2 katına çıkarıldı: 1.0, 0.6, 0.8)
            const basketGeo = new THREE.CylinderGeometry(1.0, 0.6, 0.8, 16);
            const basketMat = new THREE.MeshStandardMaterial({ color: 0xeab308, roughness: 0.4 }); 
            basket = new THREE.Mesh(basketGeo, basketMat);
            
            // Sepet tam olarak gameDepth (-9.0) uzaklık çizgisine yerleştirildi
            basket.position.set(0, horizonHeight, gameDepth); 
            scene.add(basket);

            window.addEventListener('resize', onWindowResize, false);
        }

        function spawnApple() {
            const randomLaneIndex = Math.floor(Math.random() * lanes.length);
            const laneX = lanes[randomLaneIndex];

            const isGreen = Math.random() > 0.5;
            const appleColor = isGreen ? 0x22c55e : 0xef4444;

            // Elma yarıçapı 1.5 katına çıkarıldı (0.2 -> 0.3)
            const appleGeo = new THREE.SphereGeometry(0.3, 12, 12);
            const appleMat = new THREE.MeshStandardMaterial({ color: appleColor, roughness: 0.3 });
            const apple = new THREE.Mesh(appleGeo, appleMat);
            
            // Elma sepetle aynı uzaklık düzleminde (-9.0) havadan bırakılıyor
            apple.position.set(laneX, spawnHeight, gameDepth);
            apple.userData = { isGreen: isGreen };
            
            scene.add(apple);
            apples.push(apple);
        }

        // --- ANA DÖNGÜ VE RENDER ---
        function animate(currentTime) {
            requestAnimationFrame(animate);

            // 1. Jiroskop Takip Hesaplamaları
            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
            calibratedTarget.copy(rawSensorQuaternion);
            calibratedTarget.multiply(worldTransform);
            calibratedTarget.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));
            calibratedTarget.premultiply(sensorBiasQuaternion);

            currentQuaternion.slerp(calibratedTarget, SMOOTH_FACTOR);
            camera.quaternion.copy(currentQuaternion);

            // 2. Pürüzsüz Sepet Hareketi (Mesafe 3 kat arttığı için X eksenindeki çarpan hassasiyeti de artırıldı)
            const lookDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            let targetX = lookDirection.x * 24.0; 
            targetX = Math.max(-11.0, Math.min(11.0, targetX));
            basket.position.x = THREE.MathUtils.lerp(basket.position.x, targetX, SMOOTH_FACTOR * 1.5);

            // 3. Elma Doğurma Tetikleyicisi
            if (currentTime - lastAppleSpawnTime > spawnInterval) {
                spawnApple();
                lastAppleSpawnTime = currentTime;
            }

            // 4. Elma Davranış Kontrolleri
            for (let i = apples.length - 1; i >= 0; i--) {
                const apple = apples[i];
                
                apple.position.y -= appleFallSpeed; 

                const distanceX = Math.abs(apple.position.x - basket.position.x);
                const distanceY = Math.abs(apple.position.y - basket.position.y);

                // Yeni ölçeklendirilmiş yakalama alanı kontrolü
                if (distanceY < 0.5 && distanceX < catchRadius) {
                    const caughtGreen = apple.userData.isGreen;
                    
                    if (caughtGreen) {
                        score += 1;
                        playSound(true); 
                        spawnFeedback('success', apple.position.x); 
                    } else {
                        score -= 1;
                        playSound(false); 
                        spawnFeedback('fail', apple.position.x); 
                    }

                    console.log("Mevcut Skor: " + score);
                    scene.remove(apple);
                    apples.splice(i, 1);
                    continue;
                }

                if (apple.position.y < 0) {
                    scene.remove(apple);
                    apples.splice(i, 1);
                }
            }

            // 5. Geri Bildirim Efektleri Animasyonu
            for (let j = feedbackSprites.length - 1; j >= 0; j--) {
                const f = feedbackSprites[j];
                f.lifetime++;
                f.mesh.position.y += 0.03; 
                
                if (f.lifetime > f.maxLifetime) {
                    scene.remove(f.mesh);
                    f.mesh.material.map.dispose();
                    f.mesh.material.dispose();
                    feedbackSprites.splice(j, 1);
                }
            }

            effect.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ETKİLEŞİM VE OYUN BAŞLATMA ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            const permitted = await requestSensorsPermission();
            if (!permitted) return;

            initAudio(); 
            await requestWakeLock(); // Ekran kilidini devre dışı bırak, parlaklığı koru

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';

            init();
            requestAnimationFrame(animate);
        });

        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
