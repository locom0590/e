<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kognitif VR Labirent - Stabil Çekirdek</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* Başlangıç ve İzin Ekranı (Overlay) */
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #2563eb; color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); transition: transform 0.2s;
        }
        .vr-start-btn:active { transform: scale(0.95); }
        
        /* Oyun İçi Küçük Kalibrasyon Butonu */
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 12px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h2>KOGNİTİF VR LABİRENT</h2>
        <p>Lütfen telefonu yatay konuma getirin ve VR Gözlüğe takmadan önce Başlat'a basın.</p>
        <button class="vr-start-btn" id="btn-start">VR MODUNU BAŞLAT</button>
    </div>

    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, effect;
        let container = document.getElementById('canvas-container');
        
        // Jiroskop ve Yumuşatma (Slerp) Değişkenleri
        let currentQuaternion = new THREE.Quaternion();
        let targetQuaternion = new THREE.Quaternion();
        let sensorBiasQuaternion = new THREE.Quaternion();
        const SMOOTH_FACTOR = 0.2; // Mobil gecikmesini azaltmak için hafif artırıldı

        // Mobil Eksen Düzeltme Objeleri (Asla değişmeyecek sabitler)
        const zee = new THREE.Vector3(0, 0, 1);
        const eulerOrder = 'YXZ';
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90 deg X

        // --- 1. GÜVENLİ SENSÖR İZİN MEKANİZMASI ---
        async function requestSensorsPermission() {
            // iOS 13+ Cihazlar için kontrol
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, false);
                        return true;
                    } else {
                        alert('Jiroskop izni reddedildi. VR modu çalışamaz.');
                        return false;
                    }
                } catch (error) {
                    console.error(error);
                    return false;
                }
            } else {
                // Android veya Eski iOS Cihazlar doğrudan dinleyebilir
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                return true;
            }
        }

        // --- 2. LANDSCAPE UYUMLU EKASEN HESAPLAMA ---
        function onDeviceOrientation(event) {
            if (event.alpha === null) return;

            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            
            // Ekranın dönüş açısını al (Yatay/Dikey durum kontrolü)
            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

            // Ham veriyi Euler'e dök
            const euler = new THREE.Euler(beta, alpha, -gamma, eulerOrder);
            
            // Telefon yatay çevrildiğinde çökmeyi önleyen Quaternion dönüşümü
            targetQuaternion.setFromEuler(euler);
            targetQuaternion.multiply(worldTransform);
            targetQuaternion.multiply(currentQuaternion.setFromAxisAngle(zee, -orient));
        }

        // --- 3. ANA KURULUM ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 1.6, 0); 
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance",
                precision: "mediump"
            });
            // Çift ekranda piksel taşmasını önlemek için 2 ile sınırla
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Stereoscopic Efekt
            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); 
            effect.setSize(window.innerWidth, window.innerHeight);

            // Basit Işık ve Test Izgarası
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const grid = new THREE.GridHelper(60, 60, 0x3b82f6, 0x1e293b);
            grid.position.y = 0;
            scene.add(grid);

            window.addEventListener('resize', onWindowResize, false);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Slerp ile yumuşatılmış jiroskop takibi
            currentQuaternion.slerp(targetQuaternion, SMOOTH_FACTOR);
            camera.quaternion.copy(sensorBiasQuaternion).multiply(currentQuaternion);

            effect.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. ETKİLEŞİM VE BAŞLATMA ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            // Önce sensör izni iste
            const permitted = await requestSensorsPermission();
            if (!permitted) return;

            // Tam ekrana geç (Adres barını uçur)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) { /* iOS Safari */
                document.documentElement.webkitRequestFullscreen();
            }

            // Arayüzü güncelle
            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';

            // Sistemleri tetikle
            init();
            animate();
        });

        // Bakış açısını sıfırlama (Kullanıcı kafasını dik tutup basmalı)
        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
